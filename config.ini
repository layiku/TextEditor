# DOS 文本编辑器默认配置文件
# 此文件为程序目录默认值，用户修改请复制到：
#   Windows: %APPDATA%\edit.ini
#   Linux:   ~/.edit.ini

# 换行模式：0=字符折行(Char Wrap)  1=横滚(No Wrap)
wrap_mode=0

# 是否显示行号：0=不显示  1=显示
show_lineno=0

# Tab 宽度（显示为空格数）
tab_size=4

# 最大文件大小（字节），超过此值加载时提示
max_file_size=524288

# 语法高亮扩展名覆盖（可选）
# 格式：syntax_ext_<扩展名>=<ini文件名>
# 例：syntax_ext_xyz=c.ini   表示 .xyz 文件使用 C 语法高亮
# 例：syntax_ext_conf=python.ini
# 注：<ini文件名> 须存在于 syntax/ 目录下

# 自定义文件扩展名→语法高亮映射（可选）
# 格式：syntax_ext_<扩展名>=<syntax目录下的INI文件名>
# 示例：让 .xyz 文件使用 C 语法高亮
# syntax_ext_xyz=c.ini
# 示例：让 .conf 文件使用 INI/Batch 语法高亮
# syntax_ext_conf=batch.ini
