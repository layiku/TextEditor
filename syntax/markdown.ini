; syntax/markdown.ini — Markdown 语法高亮规则
; 注：Markdown 行内语法（**粗体**、_斜体_）使用正则匹配

[meta]
name = Markdown
extensions = .md .markdown .mdown

; ---- ATX 标题（# 行首） ----
[rule.heading]
type = line_start
prefix = #
color = bright_cyan
priority = 10

; ---- 引用块（> 行首） ----
[rule.blockquote]
type = line_start
prefix = >
color = dark_grey
priority = 8

; ---- 有序/无序列表（- / * / + / 1. 行首，用正则） ----
[rule.list_marker]
type = regex
pattern = ^(\s*)([-*+]|\d+\.)[ ]
color = bright_yellow
priority = 7

; ---- 反引号内联代码 `code` ----
[rule.inline_code]
type = string
delimiter = `
escape = 
color = green
priority = 9

; ---- 粗体 **text** ----
[rule.bold]
type = regex
pattern = \*\*[^*]+\*\*
color = bright_white
priority = 6

; ---- 斜体 *text* ----
[rule.italic]
type = regex
pattern = \*[^*]+\*
color = white
priority = 5

; ---- 链接/图片 [...] (...) ----
[rule.link]
type = regex
pattern = !?\[[^\]]*\](\([^)]*\))?
color = bright_blue
priority = 8

; ---- HTML 注释 <!-- --> ----
[rule.html_comment]
type = block_comment
start = <!--
end = -->
color = dark_grey
priority = 4
