; syntax/c.ini — C/C++ 语法高亮规则
; 格式说明：
;   [meta]        语言元信息（名称和关联扩展名）
;   [rule.<名>]   一条规则，由 type/color/priority 等字段定义
;   \             行尾反斜杠用于续行（仅 words 字段）

[meta]
name = C/C++ Source
extensions = .c .h .cpp .hpp .cc .cxx .hh

; ---- 关键词（优先级 10，青色） ----
[rule.keyword]
type = keyword
words = if else for while do switch case break continue return goto \
        void int char float double long short unsigned signed \
        static extern inline const volatile register auto \
        struct union enum typedef sizeof typeof \
        true false null nullptr NULL \
        new delete this class public private protected virtual override \
        namespace using template typename operator friend explicit
color = cyan
priority = 10

; ---- 预处理指令（行首 #，品红色，优先级 9） ----
[rule.preproc]
type = line_start
prefix = #
color = magenta
priority = 9

; ---- 双引号字符串（黄色，优先级 8） ----
[rule.string_dq]
type = string
delimiter = "
escape = \
color = yellow
priority = 8

; ---- 单引号字符字面量（绿色，优先级 8） ----
[rule.char_lit]
type = string
delimiter = '
escape = \
color = green
priority = 8

; ---- 行注释 // （深灰色，优先级 5） ----
[rule.line_comment]
type = line_comment
prefix = //
color = dark_grey
priority = 5

; ---- 块注释 /* */ （深灰色，优先级 5） ----
[rule.block_comment]
type = block_comment
start = /*
end = */
color = dark_grey
priority = 5

; ---- 数字字面量（亮品红，优先级 6） ----
[rule.number]
type = number
color = bright_magenta
priority = 6
