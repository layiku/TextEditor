; syntax/batch.ini — Windows 批处理脚本语法高亮规则
; 扩展名：.bat .cmd

[meta]
name = Batch
extensions = .bat .cmd

; ---- :: 注释（双冒号，深灰色，最高优先级） ----
[rule.comment_colons]
type = line_comment
prefix = ::
color = dark_grey
priority = 20

; ---- rem 注释（小写，深灰色） ----
[rule.comment_rem_lower]
type = line_comment
prefix = rem 
color = dark_grey
priority = 20

; ---- REM 注释（大写，深灰色） ----
[rule.comment_rem_upper]
type = line_comment
prefix = REM 
color = dark_grey
priority = 20

; ---- 标签 :labelname（行首冒号，亮黄色，整行） ----
; 注意：:: 注释行优先级更高，不会被错误地当作标签
[rule.label]
type = line_start
prefix = :
color = bright_yellow
priority = 9

; ---- @ 前缀命令（@echo off 等，品红色） ----
[rule.at_prefix]
type = line_start
prefix = @
color = magenta
priority = 8

; ---- 语言关键词（青色） ----
[rule.keyword]
type = keyword
words = if else for in do goto call exit set pause echo start cd dir \
        copy del move ren md rd type cls pushd popd shift not exist \
        defined errorlevel endlocal setlocal enabledelayedexpansion \
        disabledelayedexpansion equ neq lss leq gtr geq
color = cyan
priority = 10

; ---- 环境变量 %VAR%（亮绿色） ----
[rule.envvar]
type = regex
pattern = %[^%\r\n]+%
color = bright_green
priority = 11

; ---- 数字 ----
[rule.number]
type = number
color = bright_magenta
priority = 6
