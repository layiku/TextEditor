; syntax/python.ini — Python 语法高亮规则

[meta]
name = Python Source
extensions = .py .pyw

; ---- 关键词 ----
[rule.keyword]
type = keyword
words = False None True and as assert async await break class continue \
        def del elif else except finally for from global if import in \
        is lambda nonlocal not or pass raise return try while with yield \
        self cls super __init__ __name__ __main__
color = cyan
priority = 10

; ---- 内建函数（较低优先级，亮青） ----
[rule.builtin]
type = keyword
words = print len range type int float str list dict set tuple bool \
        open close read write append input abs min max sum sorted \
        enumerate zip map filter isinstance hasattr getattr setattr
color = bright_cyan
priority = 7

; ---- 双引号字符串 ----
[rule.string_dq]
type = string
delimiter = "
escape = \
color = yellow
priority = 8

; ---- 单引号字符串 ----
[rule.string_sq]
type = string
delimiter = '
escape = \
color = yellow
priority = 8

; ---- 行注释 # ----
[rule.comment]
type = line_comment
prefix = #
color = dark_grey
priority = 5

; ---- 数字 ----
[rule.number]
type = number
color = bright_magenta
priority = 6

; ---- 装饰器 @xxx（行首正则匹配） ----
[rule.decorator]
type = regex
pattern = @[a-zA-Z_][a-zA-Z0-9_.]*
color = bright_yellow
priority = 9
