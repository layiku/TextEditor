; syntax/html.ini — HTML / XML / SVG 语法高亮规则
; 扩展名：.html .htm .xhtml .xml .svg

[meta]
name = HTML
extensions = .html .htm .xhtml .xml .svg

; ---- 注释 <!-- --> （跨行，深灰色，最高优先级） ----
[rule.comment]
type = block_comment
start = <!--
end = -->
color = dark_grey
priority = 20

; ---- DOCTYPE 声明（品红色，行首正则） ----
[rule.doctype]
type = regex
pattern = <!DOCTYPE[^>]*>
color = magenta
priority = 15

; ---- 标签名 <tag 或 </tag（包括自闭合，青色） ----
; 匹配 < 或 </ 加上字母开头的标签名
[rule.tag_open]
type = regex
pattern = </?[a-zA-Z][a-zA-Z0-9_:-]*
color = cyan
priority = 10

; ---- 标签结束符 > 和 /> ----
[rule.tag_close]
type = regex
pattern = /?>
color = cyan
priority = 10

; ---- 双引号属性值 ----
[rule.attr_dq]
type = string
delimiter = "
color = yellow
priority = 8

; ---- 单引号属性值 ----
[rule.attr_sq]
type = string
delimiter = '
color = yellow
priority = 8

; ---- HTML 实体 &amp; &lt; &nbsp; 等（亮绿色） ----
[rule.entity]
type = regex
pattern = &[a-zA-Z][a-zA-Z0-9]*;
color = bright_green
priority = 7

; ---- 数字（如 style 属性中的像素值）----
[rule.number]
type = number
color = bright_magenta
priority = 6
