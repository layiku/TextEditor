; syntax/json.ini — JSON / JSON with Comments 语法高亮规则
; 扩展名：.json .jsonc
; 注：标准 JSON 不含注释，但 .jsonc（VS Code 配置等）支持 // 和 /* */

[meta]
name = JSON
extensions = .json .jsonc

; ---- JSON 字符串（双引号，含键名和值）----
[rule.string]
type = string
delimiter = "
escape = \
color = yellow
priority = 8

; ---- JSON 关键字 true / false / null ----
[rule.keyword]
type = keyword
words = true false null
color = cyan
priority = 10

; ---- 数字 ----
[rule.number]
type = number
color = bright_magenta
priority = 6

; ---- JSON with Comments：行注释 // （.jsonc 文件）----
[rule.line_comment]
type = line_comment
prefix = //
color = dark_grey
priority = 20

; ---- JSON with Comments：块注释 /* */ ----
[rule.block_comment]
type = block_comment
start = /*
end = */
color = dark_grey
priority = 20
