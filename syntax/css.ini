; syntax/css.ini — CSS / SCSS / Less 语法高亮规则
; 扩展名：.css .scss .less

[meta]
name = CSS
extensions = .css .scss .less .sass

; ---- 块注释 /* */ ----
[rule.comment]
type = block_comment
start = /*
end = */
color = dark_grey
priority = 20

; ---- @规则：@media @import @keyframes 等（品红色） ----
[rule.at_rule]
type = line_start
prefix = @
color = magenta
priority = 9

; ---- 双引号字符串 ----
[rule.string_dq]
type = string
delimiter = "
escape = \
color = yellow
priority = 8

; ---- 单引号字符串 ----
[rule.string_sq]
type = string
delimiter = '
escape = \
color = yellow
priority = 8

; ---- CSS 颜色十六进制值 #rrggbb / #rgb（亮黄色） ----
[rule.color_hex]
type = regex
pattern = #[0-9a-fA-F]+
color = bright_yellow
priority = 7

; ---- CSS 属性值中的数字（包含单位如 12px 中的 12）----
[rule.number]
type = number
color = bright_magenta
priority = 6

; ---- 伪类和伪元素 :hover ::before 等（亮青色） ----
[rule.pseudo]
type = regex
pattern = ::?[a-zA-Z-]+
color = bright_cyan
priority = 5

; ---- !important（红色醒目） ----
[rule.important]
type = regex
pattern = !important
color = bright_red
priority = 12
