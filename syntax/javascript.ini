; syntax/javascript.ini — JavaScript / TypeScript 语法高亮规则
; 扩展名：.js .mjs .cjs .jsx .ts .tsx

[meta]
name = JavaScript
extensions = .js .mjs .cjs .jsx .ts .tsx

; ---- 语言关键词（青色，优先级 10） ----
[rule.keyword]
type = keyword
words = var let const function return if else for while do switch case break \
        continue class extends new this super import export from default as \
        async await try catch finally throw typeof instanceof in of delete \
        void null undefined true false static get set yield
color = cyan
priority = 10

; ---- 常用内建对象和函数（亮青，优先级 7） ----
[rule.builtin]
type = keyword
words = console Array Object String Number Boolean Math JSON Promise Date \
        RegExp Error Map Set Symbol WeakMap WeakSet Proxy Reflect \
        parseInt parseFloat isNaN isFinite Infinity NaN \
        setTimeout setInterval clearTimeout clearInterval \
        document window navigator location history fetch
color = bright_cyan
priority = 7

; ---- 行注释 // ----
[rule.line_comment]
type = line_comment
prefix = //
color = dark_grey
priority = 20

; ---- 块注释 /* */ ----
[rule.block_comment]
type = block_comment
start = /*
end = */
color = dark_grey
priority = 20

; ---- 双引号字符串 ----
[rule.string_dq]
type = string
delimiter = "
escape = \
color = yellow
priority = 8

; ---- 单引号字符串 ----
[rule.string_sq]
type = string
delimiter = '
escape = \
color = yellow
priority = 8

; ---- 模板字面量 `...` ----
[rule.string_template]
type = string
delimiter = `
escape = \
color = bright_yellow
priority = 8

; ---- 数字字面量 ----
[rule.number]
type = number
color = bright_magenta
priority = 6

; ---- 装饰器 / TypeScript 注解 @xxx ----
[rule.decorator]
type = regex
pattern = @[a-zA-Z_][a-zA-Z0-9_.]*
color = magenta
priority = 9
